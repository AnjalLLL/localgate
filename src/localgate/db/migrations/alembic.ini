# Alembic config.
#
# There is no sqlalchemy.url here on purpose. The database URL is resolved at
# runtime by env.py, which asks localgate itself — so `alembic upgrade head` always
# targets the same database the gateway is actually using (including one established
# through the admin UI), and a connection string never gets duplicated into a file
# that can drift out of date.

[alembic]
script_location = %(here)s
prepend_sys_path = .
path_separator = os

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
